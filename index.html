<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Formulario de Inscripción para clases de buceo</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <h1 id="title">Formulario de Inscripción para clases de buceo</h1>
  <p id="description">Rellene cuidadosamente el siguiente formulario de inscripción:</p>
  <form id="survey-form">
    <fieldset>
      <label id="name-label" for="name">Nombre del alumno:</label>
      <input type="text" id="name" name="name" required placeholder="Ej: Juan Pérez">

      <label id="email-label" for="email">Correo electrónico:</label>
      <input type="email" id="email" name="email" required placeholder="Ej. correo@ejemplo.com">

      <label id="age-label" for="age">Edad:</label>
      <input type="number" id="age" name="age" min="15" max="80" required placeholder="Ej. 20">

      <label for="dropdown" id="dropdown-label">¿Qué esperas de este curso?</label>
      <select id="dropdown" name="dropdown" required>
        <option value="">(Seleccione una)</option>
        <option value="1">Aprender una nueva habilidad</option>
        <option value="2">Mejorar mis técnicas de buceo</option>
        <option value="3">Poder cumplir uno de mis sueños</option>
        <option value="4">Otro</option>
      </select>
    </fieldset>

    <fieldset>
      <legend>Género:</legend>
      <label for="male"><input type="radio" id="male" name="gender" value="male" class="inline"> Masculino</label>
      <label for="female"><input type="radio" id="female" name="gender" value="female" class="inline"> Femenino</label>
      <label for="other"><input type="radio" id="other" name="gender" value="other" class="inline"> Otro</label>
    </fieldset>

    <fieldset class="checkbox-group">
      <legend>Intereses:</legend>
      <label for="acnea"><input id="acnea" type="checkbox" name="interest" value="acnea"> Acnea</label>
      <label for="underwater-fishing"><input id="underwater-fishing" type="checkbox" name="interest" value="underwater-fishing"> Pesca Submarina</label>
      <label for="job"><input id="job" type="checkbox" name="interest" value="job"> Trabajo</label>
    </fieldset>

    <fieldset>
      <label for="comments">Comentarios:</label>
      <textarea id="comments" name="comments" rows="4" placeholder="Escribe tus comentarios aquí"></textarea>
    </fieldset>

    <input type="submit" id="submit" value="Enviar">
  </form>
</body>
</html>
